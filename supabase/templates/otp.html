<!DOCTYPE html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f7f9; padding: 40px;">
    <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px; border: 1px solid #e5e7eb;">
      <h1 style="margin: 0 0 8px; font-size: 20px; color: #0f172a;">Your TalentFlow sign-in code</h1>
      <p style="margin: 0 0 24px; color: #475569; font-size: 14px;">Enter this 6-digit code in the app to continue. It expires in 10 minutes.</p>
      <div style="font-size: 36px; font-weight: 700; letter-spacing: 10px; text-align: center; background: #f1f5f9; border-radius: 8px; padding: 20px; color: #0f172a; font-family: 'SF Mono', Menlo, monospace;">
        {{ .Token }}
      </div>
      <p style="margin: 24px 0 0; color: #94a3b8; font-size: 12px;">If you didn't request this, you can safely ignore this email.</p>
    </div>
  </body>
</html>
